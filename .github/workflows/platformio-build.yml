name: PlatformIO Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/platformio-build.yml"
      - "src/**"
      - "lib/**"
      - "scripts/**"
      - "test/**"
      - "platformio.ini"
      - "partitions.csv"
  pull_request:
    paths:
      - ".github/workflows/platformio-build.yml"
      - "src/**"
      - "lib/**"
      - "scripts/**"
      - "test/**"
      - "platformio.ini"
      - "partitions.csv"
  workflow_dispatch:

concurrency:
  group: platformio-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install platformio==6.1.19

      # ================= 新增步骤 1：安装字体转换工具的依赖 =================
      - name: Install font dependencies
        run: python -m pip install -r lib/EpdFont/scripts/requirements.txt

      # ================= 新增步骤 2：运行内置字体转换脚本 =================
      - name: Generate Built-in Fonts
        run: bash lib/EpdFont/scripts/convert-builtin-fonts.sh

      - name: Build default firmware
        run: pio run -e default
# ================= 新增部分 =================
      - name: Upload Firmware Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: t5s3-firmware  # 你下载时看到的压缩包名称
          path: |
            .pio/build/default/firmware.bin
            .pio/build/default/partitions.bin
            .pio/build/default/bootloader.bin
      # ============================================
  
